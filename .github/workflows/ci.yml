name: CI

# 默认关闭自动触发，只保留手动运行；要恢复自动 CI 时把下面的
# pull_request / push 触发器加回来即可。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run base CI checks
        run: ./scripts/ci.sh

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: |
            **/*.md

  plugin-fs-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 更新 Rust 工具链
        run: rustup update stable

      - name: 测试并构建 fs-watch
        working-directory: plugins/fs-watch
        run: |
          cargo test --locked
          ./build.sh
